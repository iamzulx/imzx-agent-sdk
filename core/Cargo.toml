[package]
name = "imzx-core"
version = "0.2.0"
edition = "2021"
description = "High-performance Claude Agent SDK core"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
async-trait = "0.1"
once_cell = "1.19"
pyo3 = { version = "0.22", features = ["extension-module"] }
arc-swap = "1.7"

[lib]
name = "imzx_core"
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'

[dependencies]
reqwest = { version = "0.11", features = ["json"] }
rusqlite = "0.29"
scraper = "0.17"
