services:
  imzx:
    build: .
    ports:
      - "${IMZX_PORT:-3000}:3000"
    environment:
      - OPENROUTER_API_KEY
      - ANTHROPIC_API_KEY
      - IMZX_API_KEY
      - IMZX_MODEL
      - IMZX_AUTO_APPROVE=false
    volumes:
      - imzx-data:/app/.imzx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  imzx-data:
    driver: local
